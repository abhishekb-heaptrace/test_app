<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Attendance Logger</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Body and Background */
        body {
            background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Card Styling */
        .card {
            background-color: #ffffff;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.2);
        }

        /* Title */
        h1 {
            font-weight: 700;
            color: #0d6efd;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.1);
        }

        /* Timer */
        #timer {
            font-weight: 600;
            font-size: 1.8rem;
            color: #198754;
            background-color: #e9f7ef;
            padding: 15px 20px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 25px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transition: all 0.5s ease;
        }

        /* Buttons */
        button.btn {
            font-weight: 600;
            padding: 12px 25px;
            border-radius: 8px;
            box-shadow: 0 5px 10px rgba(0,0,0,0.1);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        button.btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
        }

        /* Table Styling */
        table {
            font-size: 1rem;
            text-align: center;
        }

        table thead th {
            background-color: #0d6efd;
            color: #fff;
            border-radius: 5px;
        }

        table tbody tr {
            transition: background-color 0.3s ease;
        }

        table tbody tr:hover {
            background-color: #e3f2fd;
            cursor: pointer;
        }

        table td, table th {
            padding: 12px;
            border-top: 1px solid #dee2e6;
        }

        /* Responsive tweaks */
        @media (max-width: 768px) {
            #timer {
                font-size: 1.5rem;
                padding: 12px 15px;
            }

            button.btn {
                width: 100%;
            }
        }
    </style>
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="card shadow-lg p-4">
        <h1 class="text-center text-primary mb-4">Attendance Logger</h1>

        <!-- Timer -->
        <div id="timer" class="display-6 text-center text-success mb-4 bg-light p-3 rounded shadow-sm">
            Remaining Time: 08:00:00
        </div>

        <!-- Buttons -->
        <form id="clockForm" class="d-flex justify-content-center mb-4 flex-wrap gap-2">
            <button type="submit" name="action" value="clockIn" class="btn btn-success btn-lg">Clock In</button>
            <button type="submit" name="action" value="clockOut" class="btn btn-primary btn-lg">Clock Out</button>
            <button type="submit" name="action" value="reset" class="btn btn-danger btn-lg">Reset 8 Hours</button>
        </form>

        <!-- Logs Table -->
        <div class="table-responsive">
            <table class="table table-hover table-bordered align-middle text-center">
                <thead class="table-dark">
                    <tr>
                        <th>Clock In</th>
                        <th>Clock Out</th>
                    </tr>
                </thead>
                <tbody id="logTable"></tbody>
            </table>
        </div>
    </div>
</div>

<!-- JS -->
<script>
async function fetchData() {
    const res = await fetch('/logs');
    return res.json();
}

function formatTime(date) {
    return new Date(date).toLocaleString();
}

async function updateUI() {
    const data = await fetchData();

    // Update timer
    let remaining = data.remainingTime || 28800; // 8 hours default
    if (data.clockInTimestamp) {
        const now = Date.now();
        remaining -= Math.floor((now - new Date(data.clockInTimestamp)) / 1000);
        if (remaining < 0) remaining = 0;
    }
    const hours = String(Math.floor(remaining / 3600)).padStart(2,'0');
    const minutes = String(Math.floor((remaining % 3600)/60)).padStart(2,'0');
    const seconds = String(remaining % 60).padStart(2,'0');
    document.getElementById('timer').textContent = `Remaining Time: ${hours}:${minutes}:${seconds}`;

    // Update logs
    const tbody = document.getElementById('logTable');
    tbody.innerHTML = '';
    data.logs.forEach(log => {
        const row = document.createElement('tr');
        const clockInCell = document.createElement('td');
        clockInCell.textContent = formatTime(log.clockIn);
        const clockOutCell = document.createElement('td');
        clockOutCell.textContent = log.clockOut ? formatTime(log.clockOut) : '';
        row.appendChild(clockInCell);
        row.appendChild(clockOutCell);
        tbody.appendChild(row);
    });
}

document.getElementById('clockForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const action = e.submitter.value;

    await fetch(`/${action}`, { method: 'POST' });
    updateUI();
});

// Live update every second
setInterval(updateUI, 1000);

// Initial load
updateUI();
</script>

<!-- Bootstrap JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
